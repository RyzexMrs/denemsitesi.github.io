<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aydan & Barış</title>
    <style>
        :root {
            --neon-color: #bc13fe;
            --glow: #7a0bc0;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050505;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Neon Arkaplan Kalpleri */
        .neon-heart {
            position: absolute;
            color: var(--neon-color);
            text-shadow: 0 0 10px var(--neon-color);
            opacity: 0.5;
            animation: moveUp 6s linear infinite;
        }

        @keyframes moveUp {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.7; }
            100% { transform: translateY(-10vh) scale(1.3); opacity: 0; }
        }

        /* Ana Çerçeve ve Animasyonlu Kenarlık */
        .glass-card {
            position: relative;
            width: 350px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            text-align: center;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.2);
            border: 2px solid transparent;
            /* Kenar ışığı efekti */
            background-image: linear-gradient(#050505, #050505), linear-gradient(90deg, #bc13fe, #ff00de, #bc13fe);
            background-origin: border-box;
            background-clip: content-box, border-box;
            animation: borderGlow 4s linear infinite;
        }

        @keyframes borderGlow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        /* Senin Gönderdiğin Resim */
        .user-img {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            margin-bottom: 20px;
            object-fit: cover;
            border: 2px solid var(--neon-color);
            box-shadow: 0 0 15px var(--neon-color);
        }

        h2 {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 25px;
            text-shadow: 0 0 5px var(--neon-color);
        }

        .btn {
            background: transparent;
            color: white;
            border: 2px solid var(--neon-color);
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 10px var(--glow);
        }

        .btn:hover {
            background: var(--neon-color);
            box-shadow: 0 0 25px var(--neon-color);
        }

        /* Modal ve Butonlar */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        #yox-btn { position: relative; transition: 0.1s; }

        .final-msg {
            color: #ff00de;
            font-size: 1.5rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div id="hearts"></div>

    <div class="glass-card" id="main-screen">
        <img src="https://i.ibb.co/FbMjZyLn/image.png" alt="Resim" class="user-img">
        <h2>Sene soyuğ davrandığım üçün bağışla</h2>
        <button class="btn" onclick="openStep2()">Buna Bas</button>
    </div>

    <div class="modal" id="modal-step2">
        <div class="glass-card">
            <h2>Bağışladın?</h2>
            <div class="btn-group">
                <button class="btn" onclick="openStep3()">He</button>
                <button class="btn" id="yox-btn" onmouseover="escapeBtn()">Yox</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-step3">
        <div class="glass-card">
            <div class="final-msg">
                Teşekkürler Yaxşıkı varsan 💞<br>
                <span style="font-size: 0.9rem; color: #888;">(birde küs yatma)</span>
            </div>
        </div>
    </div>

    <script>
        // Arkaplan Kalpleri
        function createHearts() {
            const container = document.getElementById('hearts');
            const h = document.createElement('div');
            h.className = 'neon-heart';
            h.innerHTML = '💜';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = (Math.random() * 3 + 2) + 's';
            container.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }
        setInterval(createHearts, 200);

        // Sayfa Geçişleri
        function openStep2() {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('modal-step2').style.display = 'flex';
        }

        function openStep3() {
            document.getElementById('modal-step2').style.display = 'none';
            document.getElementById('modal-step3').style.display = 'flex';
        }

        // Yox Butonundan Kaçış
        function escapeBtn() {
            const btn = document.getElementById('yox-btn');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.innerText = "Error! 🤣";
        }

        // Sağ tık engelleme (Kod koruması için)
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
